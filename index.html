<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Yaman Perfumes - Luxury E-commerce</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #f3f4f6;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .serif {
            font-family: 'Playfair Display', serif;
        }

        .gold-text {
            color: #EAB308;
        }

        .gold-bg {
            background-color: #EAB308;
        }

        /* custom scrollbar for collection */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- Inline Icons (mimicking lucide-react) ---
        const Search = ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const ShoppingCart = ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>;
        const HomeIcon = ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
        const Menu = ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
        const X = ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const Plus = ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const Minus = ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const CheckCircle = ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const Settings = ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const Pencil = ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
        const Trash = ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;


        // --- Mock Data ---
        const initialProducts = [
            { id: 1, name: 'Royal Oud', collection: 'Oud', price: 250, stock: 15, description: 'A majestic blend of aged agarwood, rose, and amber. Perfect for evening wear and special occasions.', image: 'https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&q=80&w=800' },
            { id: 2, name: 'Midnight Musk', collection: 'Musky', price: 180, stock: 8, description: 'Sensual white musk layered with vanilla and subtle woods. A scent that lingers intimately on the skin.', image: 'https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&q=80&w=800' },
            { id: 3, name: 'Desert Rose', collection: 'Floral', price: 210, stock: 20, description: 'Blooming Taif rose with hints of saffron and sandalwood. A romantic and bold statement.', image: 'https://images.unsplash.com/photo-1588405748880-12d1d2a59f75?auto=format&fit=crop&q=80&w=800' },
            { id: 4, name: 'Amber Nights', collection: 'Oriental', price: 195, stock: 12, description: 'Warm amber, spicy cardamom, and rich patchouli. Captures the essence of Arabian nights.', image: 'https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?auto=format&fit=crop&q=80&w=800' },
            { id: 5, name: 'Golden Oud', collection: 'Oud', price: 300, stock: 5, description: 'The purest Cambodian oud with a touch of gold flakes. The ultimate luxury fragrance.', image: 'https://images.unsplash.com/photo-1615631525413-8a30c5e75141?auto=format&fit=crop&q=80&w=800' },
            { id: 6, name: 'Velvet Jasmine', collection: 'Floral', price: 160, stock: 25, description: 'Night-blooming jasmine paired with creamy coconut. Soft, elegant, and mesmerizing.', image: 'https://images.unsplash.com/photo-1557170334-a9632e77c6e4?auto=format&fit=crop&q=80&w=800' },
            { id: 7, name: 'Spicy Bazaar', collection: 'Oriental', price: 175, stock: 18, description: 'An exotic mix of cinnamon, clove, and sweet tobacco. A warm and inviting aroma.', image: 'https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&q=80&w=800' },
            { id: 8, name: 'Pure Musk', collection: 'Musky', price: 150, stock: 30, description: 'Clean, powdery musk that provides a fresh and uplifting feeling throughout the day.', image: 'https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&q=80&w=800' }
        ];

        const collections = ['All', 'Oriental', 'Floral', 'Oud', 'Musky'];

        // --- Main App Component ---
        function App() {
            // 1. ADVANCED STATE MANAGEMENT & ROUTING
            // State Flow: Controls the main view of the SPA
            const [currentView, setCurrentView] = useState('home'); // 'home', 'about', 'admin', 'checkout'

            // State Flow: Core Application Data
            // Inventory Update Logic: We use a state array for products so admin additions update the UI instantly
            const [products, setProducts] = useState(initialProducts);
            const [cartItems, setCartItems] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [activeCollection, setActiveCollection] = useState('All');
            const [quickViewProduct, setQuickViewProduct] = useState(null);
            const [orders, setOrders] = useState([]);

            // State Flow: Store Information
            const [storeInfo, setStoreInfo] = useState({
                aboutUs: "Al-Yaman Perfumes brings you the finest luxury fragrances crafted with rare and authentic ingredients from around the world. Founded on a passion for scent, our master perfumers blend tradition with modern elegance.",
                contactEmail: "[EMAIL_ADDRESS]",
                contactPhone: "+(962)0792006603"
            });

            // Admin System State
            const [isAdmin, setIsAdmin] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);

            // State Flow: Form for adding new products dynamically
            const [newProductForm, setNewProductForm] = useState({
                name: '', image: '', price: '', stock: '', collection: 'Oriental', description: ''
            });

            // UI Interaction States
            const [showCollectionBar, setShowCollectionBar] = useState(false);
            const [showSearch, setShowSearch] = useState(false);

            // Checkout Flow States (3-Step Process)
            const [checkoutStep, setCheckoutStep] = useState(1); // 1: Summary, 2: Payment, 3: Confirmation
            const [checkoutForm, setCheckoutForm] = useState({
                name: '', address: '', paymentMethod: 'credit'
            });

            // 5. TECHNICAL CONSTRAINTS: useMemo for filtering products efficiently
            const filteredProducts = useMemo(() => {
                return products.filter(product => {
                    const matchesCollection = activeCollection === 'All' || product.collection === activeCollection;
                    const matchesSearch = product.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        product.description.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesCollection && matchesSearch;
                });
            }, [products, activeCollection, searchQuery]);

            // Cart Handlers
            const addToCart = (product, quantity = 1) => {
                setCartItems(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + quantity } : item);
                    }
                    return [...prev, { ...product, quantity }];
                });
                setQuickViewProduct(null); // Close quick view if open
            };

            const updateCartQuantity = (id, delta) => {
                setCartItems(prev => prev.map(item => {
                    if (item.id === id) {
                        const newQuantity = Math.max(0, item.quantity + delta);
                        return { ...item, quantity: newQuantity };
                    }
                    return item;
                }).filter(item => item.quantity > 0)); // Remove if 0
            };

            const cartTotal = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            // Checkout Logic: Handles the 3-step transition
            const handleCheckoutNext = (e) => {
                e?.preventDefault();
                if (checkoutStep === 1 && cartItems.length > 0) {
                    setCheckoutStep(2);
                } else if (checkoutStep === 2) {
                    // Step 3: Confirmation Logic - Clear cart, save order
                    const newOrder = {
                        id: Date.now(),
                        items: [...cartItems],
                        total: cartTotal,
                        details: checkoutForm,
                        date: new Date().toISOString()
                    };
                    setOrders(prev => [...prev, newOrder]);
                    setCartItems([]); // Clear cartItems state
                    setCheckoutStep(3); // Move to success view
                }
            };

            const resetToHome = () => {
                setCurrentView('home');
                setCheckoutStep(1);
                setShowCollectionBar(false);
                setShowSearch(false);
                setSearchQuery('');
                setActiveCollection('All');
            };

            const goToCheckout = () => {
                setCurrentView('checkout');
                setCheckoutStep(1);
            };

            // Inventory Update Logic: Submit handler for new products
            const handleAddProduct = (e) => {
                e.preventDefault();
                const newProduct = {
                    id: Date.now(), // Generate temporary unique ID
                    ...newProductForm,
                    price: parseFloat(newProductForm.price),
                    stock: parseInt(newProductForm.stock, 10) || 0
                };

                // State Flow: Pushing new item to front of products array so it appears immediately
                setProducts(prev => [newProduct, ...prev]);

                // Reset form
                setNewProductForm({ name: '', image: '', price: '', stock: '', collection: 'Oriental', description: '' });
                alert("Product added successfully!");
                setCurrentView('home'); // Redirect to see the new product
            };

            // Full CRUD Logic: Delete Product by ID
            const handleDeleteProduct = (e, id) => {
                e.stopPropagation();
                if (confirm("Are you sure you want to delete this product?")) {
                    setProducts(prev => prev.filter(p => p.id !== id));
                }
            };

            // Full CRUD Logic: Set Product to Edit Mode
            const handleEditClick = (e, product) => {
                e.stopPropagation();
                setEditingProduct({ ...product });
            };

            // Full CRUD Logic: Save Edited Product Details
            const handleSaveEdit = (e) => {
                e.preventDefault();
                setProducts(prev => prev.map(p => p.id === editingProduct.id ?
                    { ...editingProduct, price: parseFloat(editingProduct.price), stock: parseInt(editingProduct.stock, 10) } : p));
                setEditingProduct(null);
                alert("Product updated successfully!");
            };

            // --- Render Components ---

            // 2. NAVIGATION & UI ENHANCEMENTS: Header
            const renderHeader = () => (
                <header className="sticky top-0 z-40 bg-black/95 backdrop-blur-md border-b border-yellow-500/20">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                        <div className="flex items-center space-x-4 w-1/3">
                            <button onClick={resetToHome} className="text-white hover:text-yellow-500 transition" title="Home">
                                <HomeIcon size={24} />
                            </button>
                            <button onClick={() => setShowCollectionBar(!showCollectionBar)} className="text-white hover:text-yellow-500 transition flex items-center space-x-2">
                                <Menu size={24} />
                                <span className="hidden sm:inline font-medium tracking-wider text-sm uppercase">Collections</span>
                            </button>
                        </div>

                        <div className="w-1/3 text-center">
                            <h1 className="serif text-2xl md:text-3xl gold-text tracking-widest cursor-pointer inline-block" onClick={resetToHome}>
                                AL-YAMAN
                            </h1>
                        </div>

                        <div className="flex items-center justify-end space-x-4 w-1/3">
                            <div className="relative flex items-center">
                                {showSearch && (
                                    <input
                                        type="text"
                                        placeholder="Search perfumes..."
                                        className="absolute right-8 w-48 sm:w-64 bg-gray-900 border border-yellow-500/50 text-white px-3 py-1.5 text-sm rounded focus:outline-none focus:border-yellow-500"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        autoFocus
                                    />
                                )}
                                <button onClick={() => setShowSearch(!showSearch)} className="text-white hover:text-yellow-500 transition" title="Search">
                                    <Search size={22} />
                                </button>
                            </div>
                            <button onClick={goToCheckout} className="text-white hover:text-yellow-500 transition relative" title="Cart">
                                <ShoppingCart size={22} />
                                {cartItems.length > 0 && (
                                    <span className="absolute -top-2 -right-2 bg-yellow-500 text-black text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">
                                        {cartItems.reduce((acc, item) => acc + item.quantity, 0)}
                                    </span>
                                )}
                            </button>
                            {isAdmin && (
                                <button onClick={() => setCurrentView('admin')} className="text-yellow-500 hover:text-white transition ml-4" title="Admin Panel">
                                    <Settings size={22} />
                                </button>
                            )}
                            {/* Visible Admin Mode Toggle */}
                            <button
                                onClick={() => setIsAdmin(!isAdmin)}
                                className={`ml-4 px-3 py-1 border text-xs tracking-widest uppercase transition ${isAdmin ? 'border-yellow-500 text-yellow-500' : 'border-zinc-700 text-zinc-500 hover:text-white'}`}
                            >
                                Admin Mode
                            </button>
                        </div>
                    </div>

                    {/* Collection Bar */}
                    {showCollectionBar && (
                        <div className="border-t border-gray-800 bg-black py-3 px-4 overflow-x-auto hide-scrollbar">
                            <div className="flex space-x-8 max-w-7xl mx-auto min-w-max justify-center">
                                {collections.map(coll => (
                                    <button
                                        key={coll}
                                        onClick={() => { setActiveCollection(coll); setCurrentView('home'); }}
                                        className={`text-sm tracking-widest uppercase transition ${activeCollection === coll ? 'gold-text border-b border-yellow-500' : 'text-gray-400 hover:text-white'}`}
                                    >
                                        {coll}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </header>
            );

            // 3. PRODUCT INTERACTION: Quick View Modal
            const renderQuickView = () => {
                if (!quickViewProduct) return null;
                return (
                    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-md">
                        <div className="bg-zinc-900 border border-yellow-500/30 max-w-4xl w-full flex flex-col md:flex-row relative rounded-sm overflow-hidden shadow-2xl animate-fade-in">
                            <button onClick={() => setQuickViewProduct(null)} className="absolute top-4 right-4 text-white hover:text-yellow-500 z-10 bg-black/50 rounded-full p-1">
                                <X size={24} />
                            </button>
                            <div className="md:w-1/2 h-64 md:h-[500px]">
                                <img src={quickViewProduct.image} alt={quickViewProduct.name} className="w-full h-full object-cover" />
                            </div>
                            <div className="md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
                                <div className="flex justify-between items-center mb-3">
                                    <p className="text-yellow-500 tracking-widest text-xs uppercase">{quickViewProduct.collection}</p>
                                    <p className="text-gray-500 text-xs tracking-widest uppercase">Stock: {quickViewProduct.stock}</p>
                                </div>
                                <h2 className="serif text-3xl md:text-4xl text-white mb-4">{quickViewProduct.name}</h2>
                                <p className="text-2xl text-gray-300 mb-6 font-light">${quickViewProduct.price}</p>
                                <p className="text-gray-400 leading-relaxed mb-8">{quickViewProduct.description}</p>
                                <button
                                    onClick={() => addToCart(quickViewProduct)}
                                    className="w-full py-4 bg-yellow-500 text-black font-semibold tracking-widest uppercase hover:bg-yellow-400 transition"
                                >
                                    Add to Cart
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // Main Product Grid View
            const renderHome = () => (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-20">
                    <div className="text-center mb-16">
                        <h2 className="serif text-4xl md:text-5xl text-white mb-6">Discover the Essence of Luxury</h2>
                        <p className="text-gray-400 max-w-2xl mx-auto text-lg font-light">Explore our curated collection of masterfully blended fragrances.</p>
                    </div>

                    {/* 5. TECHNICAL CONSTRAINTS: 1 col mobile, 4 cols desktop */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                        {filteredProducts.length === 0 ? (
                            <div className="col-span-full text-center text-gray-500 py-12 text-lg">No products match your criteria.</div>
                        ) : (
                            filteredProducts.map(product => (
                                <div key={product.id} className="group bg-zinc-900/50 border border-zinc-800 hover:border-yellow-500/50 transition duration-300 flex flex-col relative">
                                    {/* Full CRUD Logic: Admin Edit/Delete Controls overlay */}
                                    {isAdmin && (
                                        <div className="absolute top-2 left-2 right-2 z-10 flex justify-between items-start">
                                            <div className="bg-black/80 text-yellow-500 text-xs px-2 py-1 border border-yellow-500/50">
                                                Stock: {product.stock}
                                            </div>
                                            <div className="flex flex-col space-y-2">
                                                <button onClick={(e) => handleEditClick(e, product)} className="bg-zinc-800/90 border border-zinc-600 text-white p-2 hover:bg-zinc-700 transition rounded-full" title="Edit Product"><Pencil size={14} /></button>
                                                <button onClick={(e) => handleDeleteProduct(e, product.id)} className="bg-red-900/90 border border-red-700 text-white p-2 hover:bg-red-800 transition rounded-full" title="Delete Product"><Trash size={14} /></button>
                                            </div>
                                        </div>
                                    )}
                                    <div className="relative h-72 overflow-hidden bg-zinc-800">
                                        <img src={product.image} alt={product.name} className="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition duration-700" />
                                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center backdrop-blur-[2px]">
                                            <button
                                                onClick={() => setQuickViewProduct(product)}
                                                className="px-6 py-3 border border-white text-white hover:bg-white hover:text-black transition tracking-wider text-sm uppercase"
                                            >
                                                Quick View
                                            </button>
                                        </div>
                                    </div>
                                    <div className="p-6 flex-1 flex flex-col">
                                        <p className="text-yellow-500 text-xs tracking-widest uppercase mb-2">{product.collection}</p>
                                        <h3 className="serif text-xl text-white mb-3">{product.name}</h3>
                                        <div className="mt-auto flex items-center justify-between">
                                            <span className="text-lg text-gray-300 font-light">${product.price}</span>
                                            <div className="flex items-center space-x-2">
                                                <div className="flex items-center border border-zinc-700 bg-zinc-800">
                                                    <button onClick={() => updateCartQuantity(product.id, -1)} className="p-1.5 text-gray-400 hover:text-white transition" disabled={!cartItems.find(i => i.id === product.id)}>
                                                        <Minus size={16} />
                                                    </button>
                                                    <span className="px-2 text-sm text-white w-6 text-center">{cartItems.find(i => i.id === product.id)?.quantity || 0}</span>
                                                    <button onClick={() => addToCart(product, 1)} className="p-1.5 text-gray-400 hover:text-white transition">
                                                        <Plus size={16} />
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );

            // 4. ADVANCED CHECKOUT FLOW
            const renderCheckout = () => (
                <div className="max-w-4xl mx-auto px-4 py-12 md:py-20">
                    <h2 className="serif text-3xl md:text-4xl text-white mb-10 text-center">Checkout</h2>

                    {/* Step Indicators */}
                    <div className="flex justify-center mb-12">
                        <div className="flex items-center w-full max-w-md">
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center font-serif text-lg ${checkoutStep >= 1 ? 'bg-yellow-500 text-black' : 'bg-zinc-800 text-gray-500'}`}>1</div>
                            <div className={`flex-1 h-1 mx-2 ${checkoutStep >= 2 ? 'bg-yellow-500' : 'bg-zinc-800'}`}></div>
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center font-serif text-lg ${checkoutStep >= 2 ? 'bg-yellow-500 text-black' : 'bg-zinc-800 text-gray-500'}`}>2</div>
                            <div className={`flex-1 h-1 mx-2 ${checkoutStep >= 3 ? 'bg-yellow-500' : 'bg-zinc-800'}`}></div>
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center font-serif text-lg ${checkoutStep >= 3 ? 'bg-yellow-500 text-black' : 'bg-zinc-800 text-gray-500'}`}>3</div>
                        </div>
                    </div>

                    <div className="bg-zinc-900 border border-zinc-800 p-6 md:p-10 shadow-xl">
                        {/* Step 1: Summary */}
                        {checkoutStep === 1 && (
                            <div className="animate-fade-in">
                                <h3 className="serif text-2xl text-yellow-500 mb-8 border-b border-zinc-800 pb-4">Step 1: Order Summary</h3>
                                {cartItems.length === 0 ? (
                                    <div className="text-center py-12">
                                        <ShoppingCart size={48} className="mx-auto text-zinc-700 mb-4" />
                                        <p className="text-gray-400 mb-6 text-lg">Your cart is empty.</p>
                                        <button onClick={resetToHome} className="text-yellow-500 hover:text-yellow-400 underline tracking-wider uppercase text-sm">Continue Shopping</button>
                                    </div>
                                ) : (
                                    <div>
                                        <div className="space-y-6 mb-8">
                                            {cartItems.map(item => (
                                                <div key={item.id} className="flex justify-between items-center border-b border-zinc-800/50 pb-6">
                                                    <div className="flex items-center space-x-6">
                                                        <img src={item.image} alt={item.name} className="w-20 h-20 object-cover" />
                                                        <div>
                                                            <h4 className="text-white serif text-xl mb-1">{item.name}</h4>
                                                            <p className="text-gray-400 text-sm">{item.quantity} x ${item.price}</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-white font-medium text-lg">${item.price * item.quantity}</div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex justify-between items-center text-xl text-white mb-8 border-t border-yellow-500/30 pt-6">
                                            <span className="serif text-2xl">Total</span>
                                            <span className="gold-text font-bold text-3xl">${cartTotal}</span>
                                        </div>
                                        <button onClick={handleCheckoutNext} className="w-full py-4 bg-yellow-500 text-black font-semibold tracking-widest uppercase hover:bg-yellow-400 transition">
                                            Proceed to Payment
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Step 2: Payment */}
                        {checkoutStep === 2 && (
                            <form onSubmit={handleCheckoutNext} className="animate-fade-in">
                                <h3 className="serif text-2xl text-yellow-500 mb-8 border-b border-zinc-800 pb-4">Step 2: Shipping & Payment</h3>
                                <div className="space-y-6 mb-10">
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-2 uppercase tracking-wider">Full Name</label>
                                        <input required type="text" value={checkoutForm.name} onChange={e => setCheckoutForm({ ...checkoutForm, name: e.target.value })} className="w-full bg-zinc-800/50 border border-zinc-700 text-white p-3 focus:outline-none focus:border-yellow-500 transition" />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-2 uppercase tracking-wider">Shipping Address</label>
                                        <textarea required value={checkoutForm.address} onChange={e => setCheckoutForm({ ...checkoutForm, address: e.target.value })} className="w-full bg-zinc-800/50 border border-zinc-700 text-white p-3 focus:outline-none focus:border-yellow-500 transition h-28"></textarea>
                                    </div>
                                    <div className="pt-4">
                                        <label className="block text-sm text-gray-400 mb-4 uppercase tracking-wider">Payment Method</label>
                                        <div className="space-y-4">
                                            <label className="flex items-center space-x-3 cursor-pointer p-4 border border-zinc-800 hover:border-zinc-700 bg-zinc-800/30 transition">
                                                <input type="radio" name="payment" value="credit" checked={checkoutForm.paymentMethod === 'credit'} onChange={e => setCheckoutForm({ ...checkoutForm, paymentMethod: e.target.value })} className="text-yellow-500 focus:ring-yellow-500 h-4 w-4 accent-yellow-500" />
                                                <span className="text-white text-lg">Credit Card</span>
                                            </label>
                                            <label className="flex items-center space-x-3 cursor-pointer p-4 border border-zinc-800 hover:border-zinc-700 bg-zinc-800/30 transition">
                                                <input type="radio" name="payment" value="cod" checked={checkoutForm.paymentMethod === 'cod'} onChange={e => setCheckoutForm({ ...checkoutForm, paymentMethod: e.target.value })} className="text-yellow-500 focus:ring-yellow-500 h-4 w-4 accent-yellow-500" />
                                                <span className="text-white text-lg">Cash on Delivery</span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4">
                                    <button type="button" onClick={() => setCheckoutStep(1)} className="w-full sm:w-1/3 py-4 border border-zinc-700 text-white hover:bg-zinc-800 transition tracking-widest uppercase font-medium">Back</button>
                                    <button type="submit" className="w-full sm:w-2/3 py-4 bg-yellow-500 text-black font-semibold tracking-widest uppercase hover:bg-yellow-400 transition">Confirm Order</button>
                                </div>
                            </form>
                        )}

                        {/* Step 3: Confirmation */}
                        {checkoutStep === 3 && (
                            <div className="text-center py-16 animate-fade-in">
                                <CheckCircle size={80} className="mx-auto text-yellow-500 mb-6" />
                                <h3 className="serif text-4xl text-white mb-6">Order Confirmed!</h3>
                                <p className="text-gray-400 mb-10 text-lg max-w-md mx-auto leading-relaxed">Thank you for shopping with Al-Yaman. Your luxury fragrances are on their way. An email confirmation has been sent.</p>
                                <button onClick={resetToHome} className="px-10 py-4 bg-yellow-500 text-black font-semibold tracking-widest uppercase hover:bg-yellow-400 transition">
                                    Return to Home
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );

            // About / Contact View
            const renderAbout = () => (
                <div className="max-w-3xl mx-auto px-4 py-20 text-center">
                    <h2 className="serif text-4xl md:text-5xl text-yellow-500 mb-10">Our Heritage</h2>
                    <p className="text-gray-300 leading-relaxed text-lg md:text-xl mb-12 font-light">{storeInfo.aboutUs}</p>

                    <div className="border-t border-zinc-800 pt-12">
                        <h3 className="serif text-3xl text-white mb-6">Contact Us</h3>
                        <div className="text-gray-400 space-y-2 text-lg">
                            <p>{storeInfo.contactEmail}</p>
                            <p>{storeInfo.contactPhone}</p>
                        </div>
                    </div>
                </div>
            );

            // NEW: Admin Dashboard View
            const renderAdmin = () => {
                if (!isAdmin) return <div className="py-20 text-center text-white text-xl">Access Denied. Turn on Admin toggle.</div>;

                return (
                    <div className="max-w-6xl mx-auto px-4 py-16">
                        <h2 className="serif text-4xl text-yellow-500 mb-10 text-center tracking-widest">Admin Dashboard</h2>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                            {/* Edit Store Info */}
                            <div className="bg-zinc-900 border border-zinc-800 p-8 shadow-xl h-fit">
                                <h3 className="serif text-2xl text-white mb-6 border-b border-zinc-800 pb-4">Edit Store Info</h3>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-2 uppercase tracking-wider">About Us</label>
                                        <textarea
                                            value={storeInfo.aboutUs}
                                            onChange={(e) => setStoreInfo({ ...storeInfo, aboutUs: e.target.value })}
                                            className="w-full h-40 bg-zinc-800/50 border border-zinc-700 text-white p-4 focus:outline-none focus:border-yellow-500 transition leading-relaxed"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-2 uppercase tracking-wider">Contact Email</label>
                                        <input type="text" value={storeInfo.contactEmail} onChange={e => setStoreInfo({ ...storeInfo, contactEmail: e.target.value })} className="w-full bg-zinc-800/50 border border-zinc-700 text-white p-3 focus:outline-none focus:border-yellow-500 transition" />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-2 uppercase tracking-wider">Contact Phone</label>
                                        <input type="text" value={storeInfo.contactPhone} onChange={e => setStoreInfo({ ...storeInfo, contactPhone: e.target.value })} className="w-full bg-zinc-800/50 border border-zinc-700 text-white p-3 focus:outline-none focus:border-yellow-500 transition" />
                                    </div>
                                </div>
                            </div>

                            {/* Add New Product Form */}
                            <div className="bg-zinc-900 border border-zinc-800 p-8 shadow-xl">
                                <h3 className="serif text-2xl text-white mb-6 border-b border-zinc-800 pb-4">Add New Product</h3>
                                <form onSubmit={handleAddProduct} className="space-y-6">
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-2 uppercase tracking-wider">Product Name</label>
                                        <input required type="text" value={newProductForm.name} onChange={e => setNewProductForm({ ...newProductForm, name: e.target.value })} className="w-full bg-zinc-800/50 border border-zinc-700 text-white p-3 focus:outline-none focus:border-yellow-500 transition" />
                                    </div>
                                    <div className="flex space-x-4">
                                        <div className="w-1/2">
                                            <label className="block text-sm text-gray-400 mb-2 uppercase tracking-wider">Price ($)</label>
                                            <input required type="number" min="0" step="0.01" value={newProductForm.price} onChange={e => setNewProductForm({ ...newProductForm, price: e.target.value })} className="w-full bg-zinc-800/50 border border-zinc-700 text-white p-3 focus:outline-none focus:border-yellow-500 transition" />
                                        </div>
                                        <div className="w-1/2">
                                            <label className="block text-sm text-gray-400 mb-2 uppercase tracking-wider">Stock Qty</label>
                                            <input required type="number" min="0" value={newProductForm.stock} onChange={e => setNewProductForm({ ...newProductForm, stock: e.target.value })} className="w-full bg-zinc-800/50 border border-zinc-700 text-white p-3 focus:outline-none focus:border-yellow-500 transition" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-2 uppercase tracking-wider">Collection</label>
                                        <select required value={newProductForm.collection} onChange={e => setNewProductForm({ ...newProductForm, collection: e.target.value })} className="w-full bg-zinc-800/50 border border-zinc-700 text-white p-3 focus:outline-none focus:border-yellow-500 transition appearance-none">
                                            {collections.filter(c => c !== 'All').map(c => (
                                                <option key={c} value={c} className="bg-zinc-800">{c}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-2 uppercase tracking-wider">Image URL</label>
                                        <input required type="url" value={newProductForm.image} onChange={e => setNewProductForm({ ...newProductForm, image: e.target.value })} placeholder="https://..." className="w-full bg-zinc-800/50 border border-zinc-700 text-white p-3 focus:outline-none focus:border-yellow-500 transition" />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-2 uppercase tracking-wider">Description</label>
                                        <textarea required value={newProductForm.description} onChange={e => setNewProductForm({ ...newProductForm, description: e.target.value })} className="w-full h-28 bg-zinc-800/50 border border-zinc-700 text-white p-3 focus:outline-none focus:border-yellow-500 transition"></textarea>
                                    </div>
                                    <button type="submit" className="w-full py-4 bg-yellow-500 text-black font-semibold tracking-widest uppercase hover:bg-yellow-400 transition mt-6">
                                        Add to Inventory
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            };

            // Full CRUD Logic: Edit Modal View
            const renderEditModal = () => {
                if (!editingProduct) return null;
                return (
                    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
                        <div className="bg-zinc-900 border border-yellow-500/50 max-w-2xl w-full p-8 relative rounded-sm shadow-2xl animate-fade-in">
                            <button onClick={() => setEditingProduct(null)} className="absolute top-4 right-4 text-white hover:text-yellow-500 z-10">
                                <X size={24} />
                            </button>
                            <h3 className="serif text-2xl text-white mb-6 border-b border-zinc-800 pb-4">Edit Product</h3>
                            <form onSubmit={handleSaveEdit} className="space-y-4">
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1 uppercase tracking-wider">Product Name</label>
                                    <input required type="text" value={editingProduct.name} onChange={e => setEditingProduct({ ...editingProduct, name: e.target.value })} className="w-full bg-zinc-800/50 border border-zinc-700 text-white p-2 focus:outline-none focus:border-yellow-500 transition" />
                                </div>
                                <div className="flex space-x-4">
                                    <div className="w-1/2">
                                        <label className="block text-sm text-gray-400 mb-1 uppercase tracking-wider">Price ($)</label>
                                        <input required type="number" min="0" step="0.01" value={editingProduct.price} onChange={e => setEditingProduct({ ...editingProduct, price: e.target.value })} className="w-full bg-zinc-800/50 border border-zinc-700 text-white p-2 focus:outline-none focus:border-yellow-500 transition" />
                                    </div>
                                    <div className="w-1/2">
                                        <label className="block text-sm text-gray-400 mb-1 uppercase tracking-wider">Stock Qty</label>
                                        <input required type="number" min="0" value={editingProduct.stock} onChange={e => setEditingProduct({ ...editingProduct, stock: e.target.value })} className="w-full bg-zinc-800/50 border border-zinc-700 text-white p-2 focus:outline-none focus:border-yellow-500 transition" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1 uppercase tracking-wider">Collection</label>
                                    <select required value={editingProduct.collection} onChange={e => setEditingProduct({ ...editingProduct, collection: e.target.value })} className="w-full bg-zinc-800/50 border border-zinc-700 text-white p-2 focus:outline-none focus:border-yellow-500 transition appearance-none">
                                        {collections.filter(c => c !== 'All').map(c => (
                                            <option key={c} value={c} className="bg-zinc-800">{c}</option>
                                        ))}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1 uppercase tracking-wider">Image URL</label>
                                    <input required type="url" value={editingProduct.image} onChange={e => setEditingProduct({ ...editingProduct, image: e.target.value })} className="w-full bg-zinc-800/50 border border-zinc-700 text-white p-2 focus:outline-none focus:border-yellow-500 transition" />
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1 uppercase tracking-wider">Description</label>
                                    <textarea required value={editingProduct.description} onChange={e => setEditingProduct({ ...editingProduct, description: e.target.value })} className="w-full h-24 bg-zinc-800/50 border border-zinc-700 text-white p-2 focus:outline-none focus:border-yellow-500 transition"></textarea>
                                </div>
                                <button type="submit" className="w-full py-3 bg-yellow-500 text-black font-semibold tracking-widest uppercase hover:bg-yellow-400 transition mt-4">
                                    Save Changes
                                </button>
                            </form>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {renderHeader()}

                    <main className="flex-1">
                        {currentView === 'home' && renderHome()}
                        {currentView === 'checkout' && renderCheckout()}
                        {currentView === 'about' && renderAbout()}
                        {currentView === 'admin' && renderAdmin()}
                    </main>

                    <footer className="bg-black border-t border-zinc-900 py-16 mt-auto">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <h2 className="serif text-3xl text-white mb-8 tracking-widest">AL-YAMAN</h2>
                            <div className="flex justify-center space-x-8 mb-10">
                                <button onClick={resetToHome} className="text-gray-500 hover:text-yellow-500 transition tracking-widest uppercase text-sm">Home</button>
                                <button onClick={() => setCurrentView('about')} className="text-gray-500 hover:text-yellow-500 transition tracking-widest uppercase text-sm">About</button>
                                <button onClick={() => setCurrentView('checkout')} className="text-gray-500 hover:text-yellow-500 transition tracking-widest uppercase text-sm">Cart</button>
                            </div>
                            <p className="text-zinc-700 text-sm">© 2026 Al-Yaman Perfumes. All rights reserved.</p>
                            {isAdmin && <p className="text-yellow-600 mt-4 text-xs tracking-widest uppercase">Admin Mode Active</p>}
                        </div>
                    </footer>

                    {renderQuickView()}
                    {renderEditModal()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
